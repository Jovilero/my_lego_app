<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de fondo del icono -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
    
    <!-- Gradiente del bloque de Lego -->
    <linearGradient id="brickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Sombra del bloque -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Fondo redondeado suave -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Grupo del Bloque Lego con Sombra -->
  <g filter="url(#dropShadow)">
    <!-- Cuerpo principal del bloque (isométrico o vista frontal estilizada) -->
    <!-- Frontal del bloque -->
    <rect x="128" y="192" width="256" height="176" rx="24" fill="url(#brickGrad)" />
    
    <!-- Los 4 pernos (studs) superiores con relieve -->
    <circle cx="176" cy="164" r="28" fill="#d946ef" opacity="0.9" />
    <circle cx="176" cy="160" r="28" fill="#f472b6" />
    
    <circle cx="256" cy="164" r="28" fill="#a78bfa" opacity="0.9" />
    <circle cx="256" cy="160" r="28" fill="#c084fc" />
    
    <circle cx="336" cy="164" r="28" fill="#60a5fa" opacity="0.9" />
    <circle cx="336" cy="160" r="28" fill="#93c5fd" />
    
    <!-- Brillo interno sutil en el borde superior del bloque -->
    <rect x="136" y="200" width="240" height="8" rx="4" fill="#ffffff" opacity="0.15" />
  </g>
</svg>
